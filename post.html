<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post — GENIUS TY.S.</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="global-nav">
    <a class="nav-logo" href="index.html">GENIUS TY.S.</a>
    <ul class="nav-links">
      <li><a href="index.html" data-i18n="nav_home">Home</a></li>
      <li><a href="games.html" data-i18n="nav_games">Games & Apps</a></li>
      <li><a href="records.html" class="active" data-i18n="nav_records">Records & Plans</a></li>
    </ul>
    <div class="nav-right">
      <div class="lang-toggle">
        <button class="lang-btn" data-lang="en">ENG</button>
        <button class="lang-btn" data-lang="ko">KOR</button>
      </div>
      <button class="nav-hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <div class="mobile-menu" id="mobile-menu">
    <a href="index.html" data-i18n="nav_home">Home</a>
    <a href="games.html" data-i18n="nav_games">Games & Apps</a>
    <a href="records.html" data-i18n="nav_records">Records & Plans</a>
  </div>

  <main style="padding-top:44px;">
    <div class="post-content">
      <a href="records.html" class="caption" style="color:var(--ink-muted-48);text-decoration:none;display:block;margin-bottom:32px;" data-i18n="back">← Back</a>
      <div id="post-body"><p style="color:var(--ink-muted-48);">불러오는 중...</p></div>
    </div>
  </main>

  <footer><p data-i18n="footer">© GENIUS TY.S. All rights reserved.</p></footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/db.js"></script>
  <script>
    const slug = new URLSearchParams(location.search).get('slug');

    async function loadPost() {
      if (!slug) { document.getElementById('post-body').innerHTML = '<p>글을 찾을 수 없어.</p>'; return; }
      const post = await dbFetchPost(slug);
      if (!post) { document.getElementById('post-body').innerHTML = '<p>글을 찾을 수 없어.</p>'; return; }

      const title = currentLang === 'ko' ? post.title_ko : post.title_en;
      const content = currentLang === 'ko' ? post.content_ko : (post.content_en || post.content_ko);
      const catKey = post.category === 'record' ? 'cat_record' : 'cat_plan';
      const catClass = post.category === 'record' ? 'cat-record' : 'cat-plan';

      document.title = `${title} — GENIUS TY.S.`;
      document.getElementById('post-body').innerHTML = `
        <h1>${title}</h1>
        <div class="post-meta">
          <span>${post.date}</span>
          <span class="post-cat ${catClass}" style="font-size:11px;">${t(catKey)}</span>
        </div>
        <div>${marked.parse(content)}</div>
      `;
    }

    function onLangChange() { loadPost(); }
    initLang();
    loadPost();

    document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('mobile-menu').classList.toggle('open');
    });
  </script>
</body>
</html>
