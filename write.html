<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>글 쓰기 — GENIUS TY.S.</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .write-wrap { max-width: 720px; margin: 0 auto; padding: 60px 24px 80px; }
    .section-title { font-size: 21px; font-weight: 600; margin-bottom: 24px; letter-spacing: -0.374px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--ink-muted-48); margin-bottom: 6px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; background: var(--canvas-parchment); border: 1px solid var(--hairline);
      border-radius: 8px; padding: 12px 16px; font-family: var(--font); font-size: 16px;
      color: var(--ink); outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); }
    .form-group textarea { min-height: 280px; resize: vertical; line-height: 1.6; }
    .form-row { display: flex; gap: 16px; }
    .form-row .form-group { flex: 1; }
    .submit-row { display: flex; gap: 12px; margin-top: 8px; }
    .status-msg { margin-top: 12px; padding: 12px 16px; border-radius: 8px; font-size: 14px; display: none; }
    .status-ok  { background: rgba(52,199,89,0.1);  color: #1a7a32; }
    .status-err { background: rgba(255,59,48,0.1);  color: #c0392b; }
    .divider { border: none; border-top: 1px solid var(--hairline); margin: 48px 0; }
    /* Post list */
    .admin-post { display: flex; align-items: center; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--hairline); }
    .admin-post-info { flex: 1; min-width: 0; }
    .admin-post-title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .admin-post-meta  { font-size: 12px; color: var(--ink-muted-48); margin-top: 2px; }
    .icon-btn { background: none; border: 1px solid var(--hairline); border-radius: 6px; padding: 5px 10px; font-size: 13px; cursor: pointer; transition: all 0.15s; }
    .icon-btn:hover { background: var(--canvas-parchment); }
    .icon-btn.del:hover { border-color: #ff3b30; color: #ff3b30; }
    /* Password overlay */
    .pw-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .pw-box { background: var(--canvas); border-radius: 18px; padding: 36px; max-width: 360px; width: 100%; text-align: center; }
    .pw-box h2 { font-size: 21px; font-weight: 600; margin-bottom: 8px; }
    .pw-box p  { font-size: 14px; color: var(--ink-muted-80); margin-bottom: 20px; }
    .pw-box input { width: 100%; background: var(--canvas-parchment); border: 1px solid var(--hairline); border-radius: 8px; padding: 12px 16px; font-family: var(--font); font-size: 17px; text-align: center; letter-spacing: 4px; outline: none; margin-bottom: 12px; }
    .pw-box input:focus { border-color: var(--primary); }
    .pw-error { color: #c0392b; font-size: 13px; margin-top: 8px; display: none; }
  </style>
</head>
<body>

  <div class="pw-overlay" id="pw-overlay">
    <div class="pw-box">
      <h2>🔒 비밀번호</h2>
      <p>GENIUS TY.S.만 들어올 수 있어!</p>
      <input type="password" id="pw-input" placeholder="••••••" onkeydown="if(event.key==='Enter')checkPw()" />
      <button class="btn-primary" style="width:100%;padding:12px;" onclick="checkPw()">입장!</button>
      <p class="pw-error" id="pw-error">❌ 비밀번호가 틀렸어!</p>
    </div>
  </div>

  <nav class="global-nav">
    <a class="nav-logo" href="index.html">GENIUS TY.S.</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="games.html">Games & Apps</a></li>
      <li><a href="records.html" class="active">Records & Plans</a></li>
    </ul>
  </nav>

  <main style="padding-top:44px;">
    <div class="write-wrap">

      <!-- Form -->
      <h2 class="section-title" id="form-title">✏️ 새 글 쓰기</h2>
      <input type="hidden" id="editing-slug" value="" />

      <div class="form-row">
        <div class="form-group">
          <label>제목 (한국어)</label>
          <input type="text" id="title-ko" placeholder="글 제목" />
        </div>
        <div class="form-group">
          <label>제목 (영어) — 선택</label>
          <input type="text" id="title-en" placeholder="English title" />
        </div>
      </div>

      <div class="form-group">
        <label>종류</label>
        <select id="category">
          <option value="record">기록</option>
          <option value="plan">계획 & 목표</option>
        </select>
      </div>

      <div class="form-group">
        <label>내용 (한국어)</label>
        <textarea id="content-ko" placeholder="여기에 글을 써봐! 마크다운도 돼."></textarea>
      </div>

      <div class="form-group">
        <label>내용 (영어) — 선택</label>
        <textarea id="content-en" placeholder="English content (optional)" style="min-height:120px;"></textarea>
      </div>

      <div class="submit-row">
        <button class="btn-primary" id="submit-btn" onclick="submitPost()" style="flex:1;padding:12px;">🚀 올리기</button>
        <button class="btn-secondary" id="cancel-btn" onclick="cancelEdit()" style="display:none;padding:12px 20px;">취소</button>
      </div>
      <div class="status-msg" id="status-msg"></div>

      <hr class="divider" />

      <!-- Post list -->
      <h2 class="section-title">📋 올린 글 목록</h2>
      <div id="admin-list"><p style="color:var(--ink-muted-48);">불러오는 중...</p></div>

    </div>
  </main>

  <script src="js/db.js"></script>
  <script>
    const SESSION_KEY = 'geniustys_auth';
    const PW_KEY = 'geniustys_pw';

    if (sessionStorage.getItem(SESSION_KEY) === '1') {
      document.getElementById('pw-overlay').style.display = 'none';
      loadAdminList();
    }

    async function checkPw() {
      const val = document.getElementById('pw-input').value;
      const res = await fetch('/api/publish', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: val, action: 'check' })
      });
      if (res.status === 401) {
        document.getElementById('pw-error').style.display = 'block';
      } else {
        sessionStorage.setItem(SESSION_KEY, '1');
        sessionStorage.setItem(PW_KEY, val);
        document.getElementById('pw-overlay').style.display = 'none';
        loadAdminList();
      }
    }

    async function loadAdminList() {
      const el = document.getElementById('admin-list');
      const posts = await dbFetchPosts();
      if (!posts.length) { el.innerHTML = '<p style="color:var(--ink-muted-48);">아직 글이 없어!</p>'; return; }
      el.innerHTML = posts.map(p => `
        <div class="admin-post">
          <div class="admin-post-info">
            <div class="admin-post-title">${p.title_ko}</div>
            <div class="admin-post-meta">${p.date} · ${p.category === 'record' ? '기록' : '계획 & 목표'}</div>
          </div>
          <button class="icon-btn" onclick="startEdit('${p.slug}')">✏️ 수정</button>
          <button class="icon-btn del" onclick="deletePost('${p.slug}', '${p.title_ko.replace(/'/g,"\\'")}')">🗑 삭제</button>
        </div>`).join('');
    }

    function slugify(text) {
      return text.replace(/[^a-z0-9가-힣\s]/gi,'').trim().replace(/\s+/g,'-').toLowerCase().substring(0,50);
    }

    function today() {
      const d = new Date();
      const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
      return { iso: `${y}-${m}-${dd}`, display: `${y}.${m}.${dd}` };
    }

    async function submitPost() {
      const titleKo = document.getElementById('title-ko').value.trim();
      const titleEn = document.getElementById('title-en').value.trim();
      const category = document.getElementById('category').value;
      const contentKo = document.getElementById('content-ko').value.trim();
      const contentEn = document.getElementById('content-en').value.trim();
      const editingSlug = document.getElementById('editing-slug').value;
      const pw = sessionStorage.getItem(PW_KEY);

      if (!titleKo || !contentKo) { showStatus('제목이랑 한국어 내용은 꼭 써줘!', false); return; }

      const btn = document.getElementById('submit-btn');
      btn.textContent = '저장 중...'; btn.disabled = true;

      const isEdit = !!editingSlug;
      const { iso, display } = today();
      const slug = isEdit ? editingSlug : `${iso}-${slugify(titleKo)}`;

      const res = await fetch('/api/publish', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          password: pw, action: isEdit ? 'update' : 'create',
          slug, title_ko: titleKo, title_en: titleEn,
          category, content_ko: contentKo, content_en: contentEn, date: display
        })
      });

      const data = await res.json();
      if (!res.ok) { showStatus(`오류: ${data.error}`, false); }
      else {
        showStatus(isEdit ? '✅ 수정했어!' : '🎉 올렸어!', true);
        clearForm();
        loadAdminList();
      }

      btn.textContent = isEdit ? '✅ 수정하기' : '🚀 올리기';
      btn.disabled = false;
    }

    async function startEdit(slug) {
      const post = await dbFetchPost(slug);
      if (!post) return;
      document.getElementById('editing-slug').value = slug;
      document.getElementById('title-ko').value = post.title_ko || '';
      document.getElementById('title-en').value = post.title_en || '';
      document.getElementById('category').value = post.category;
      document.getElementById('content-ko').value = post.content_ko || '';
      document.getElementById('content-en').value = post.content_en || '';
      document.getElementById('form-title').textContent = '✏️ 글 수정';
      document.getElementById('submit-btn').textContent = '✅ 수정하기';
      document.getElementById('cancel-btn').style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function cancelEdit() {
      clearForm();
    }

    function clearForm() {
      document.getElementById('editing-slug').value = '';
      document.getElementById('title-ko').value = '';
      document.getElementById('title-en').value = '';
      document.getElementById('content-ko').value = '';
      document.getElementById('content-en').value = '';
      document.getElementById('category').value = 'record';
      document.getElementById('form-title').textContent = '✏️ 새 글 쓰기';
      document.getElementById('submit-btn').textContent = '🚀 올리기';
      document.getElementById('cancel-btn').style.display = 'none';
    }

    async function deletePost(slug, title) {
      if (!confirm(`"${title}" 삭제할까?`)) return;
      const pw = sessionStorage.getItem(PW_KEY);
      const res = await fetch('/api/publish', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw, action: 'delete', slug })
      });
      const data = await res.json();
      if (!res.ok) { showStatus(`오류: ${data.error}`, false); }
      else { showStatus('🗑 삭제했어!', true); loadAdminList(); }
    }

    function showStatus(msg, ok) {
      const el = document.getElementById('status-msg');
      el.textContent = msg; el.className = `status-msg ${ok ? 'status-ok' : 'status-err'}`;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 3000);
    }
  </script>
</body>
</html>
