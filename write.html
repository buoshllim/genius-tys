<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>글 쓰기 — GENIUS TY.S.</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .write-wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: 80px 24px;
    }
    .write-wrap h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 40px;
      letter-spacing: -0.374px;
    }
    .form-group {
      margin-bottom: 24px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--ink-muted-48);
      margin-bottom: 8px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      background: var(--canvas-parchment);
      border: 1px solid var(--hairline);
      border-radius: 8px;
      padding: 12px 16px;
      font-family: var(--font);
      font-size: 17px;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--primary);
    }
    .form-group textarea {
      min-height: 320px;
      resize: vertical;
      line-height: 1.6;
    }
    .form-row {
      display: flex;
      gap: 16px;
    }
    .form-row .form-group { flex: 1; }
    .publish-btn {
      width: 100%;
      padding: 14px;
      font-size: 17px;
      font-weight: 600;
      border-radius: 12px;
      margin-top: 8px;
    }
    .status-msg {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    .status-ok  { background: rgba(52,199,89,0.1);  color: #1a7a32; }
    .status-err { background: rgba(255,59,48,0.1);  color: #c0392b; }

    /* Password overlay */
    .pw-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .pw-box {
      background: var(--canvas);
      border-radius: 18px;
      padding: 36px;
      max-width: 360px;
      width: 100%;
      text-align: center;
    }
    .pw-box h2 { font-size: 21px; font-weight: 600; margin-bottom: 8px; }
    .pw-box p  { font-size: 14px; color: var(--ink-muted-80); margin-bottom: 24px; }
    .pw-box input {
      width: 100%;
      background: var(--canvas-parchment);
      border: 1px solid var(--hairline);
      border-radius: 8px;
      padding: 12px 16px;
      font-family: var(--font);
      font-size: 17px;
      text-align: center;
      letter-spacing: 4px;
      outline: none;
      margin-bottom: 12px;
    }
    .pw-box input:focus { border-color: var(--primary); }
    .pw-error { color: #c0392b; font-size: 13px; margin-top: 8px; display: none; }
  </style>
</head>
<body>

  <!-- Password overlay -->
  <div class="pw-overlay" id="pw-overlay">
    <div class="pw-box">
      <h2>🔒 비밀번호</h2>
      <p>GENIUS TY.S.만 들어올 수 있어!</p>
      <input type="password" id="pw-input" placeholder="••••••" onkeydown="if(event.key==='Enter')checkPw()" />
      <button class="btn-primary" style="width:100%;padding:12px;" onclick="checkPw()">입장!</button>
      <p class="pw-error" id="pw-error">❌ 비밀번호가 틀렸어!</p>
    </div>
  </div>

  <!-- Global Nav -->
  <nav class="global-nav">
    <a class="nav-logo" href="index.html">GENIUS TY.S.</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="games.html">Games & Apps</a></li>
      <li><a href="records.html" class="active">Records & Plans</a></li>
    </ul>
  </nav>

  <main style="padding-top: 44px;">
    <div class="write-wrap">
      <h1>✏️ 새 글 쓰기</h1>

      <div class="form-row">
        <div class="form-group">
          <label>제목 (한국어)</label>
          <input type="text" id="title-ko" placeholder="글 제목" />
        </div>
        <div class="form-group">
          <label>제목 (영어) — 선택</label>
          <input type="text" id="title-en" placeholder="English title (optional)" />
        </div>
      </div>

      <div class="form-group">
        <label>종류</label>
        <select id="category">
          <option value="record">기록</option>
          <option value="plan">계획 & 목표</option>
        </select>
      </div>

      <div class="form-group">
        <label>내용 (마크다운 가능)</label>
        <textarea id="content" placeholder="여기에 글을 써봐!&#10;&#10;## 제목은 이렇게&#10;**굵게** *기울이기*&#10;- 목록 1&#10;- 목록 2"></textarea>
      </div>

      <button class="btn-primary publish-btn" id="publish-btn" onclick="publish()">🚀 올리기</button>
      <div class="status-msg" id="status-msg"></div>
    </div>
  </main>

  <script>
    const SESSION_KEY = 'geniustys_auth';

    // Check if already authenticated this session
    if (sessionStorage.getItem(SESSION_KEY) === '1') {
      document.getElementById('pw-overlay').style.display = 'none';
    }

    function checkPw() {
      const val = document.getElementById('pw-input').value;
      // Send a test request to verify password
      fetch('/api/publish', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: val, _check: true, slug: '_check', titleKo: '_check', content: '_check', date: '_check', category: 'record' })
      }).then(r => {
        if (r.status === 401) {
          document.getElementById('pw-error').style.display = 'block';
        } else {
          sessionStorage.setItem(SESSION_KEY, '1');
          sessionStorage.setItem('geniustys_pw', val);
          document.getElementById('pw-overlay').style.display = 'none';
        }
      });
    }

    function slugify(text) {
      return text
        .replace(/[^a-z0-9가-힣\s]/gi, '')
        .trim()
        .replace(/\s+/g, '-')
        .toLowerCase()
        .substring(0, 50);
    }

    function todayDate() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,'0');
      const dd = String(d.getDate()).padStart(2,'0');
      return { iso: `${y}-${m}-${dd}`, display: `${y}.${m}.${dd}` };
    }

    async function publish() {
      const titleKo = document.getElementById('title-ko').value.trim();
      const titleEn = document.getElementById('title-en').value.trim();
      const category = document.getElementById('category').value;
      const content = document.getElementById('content').value.trim();
      const password = sessionStorage.getItem('geniustys_pw');

      if (!titleKo || !content) { showStatus('제목이랑 내용을 입력해줘!', false); return; }

      const btn = document.getElementById('publish-btn');
      btn.textContent = '올리는 중...';
      btn.disabled = true;

      const { iso, display } = todayDate();
      const slug = `${iso}-${slugify(titleKo)}`;

      try {
        const res = await fetch('/api/publish', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password, slug, titleKo, titleEn, category, content, date: display })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '오류 발생');

        showStatus('🎉 올렸어! 1~2분 후에 사이트에 나타나!', true);
        document.getElementById('title-ko').value = '';
        document.getElementById('title-en').value = '';
        document.getElementById('content').value = '';
      } catch (e) {
        showStatus(`오류: ${e.message}`, false);
      }

      btn.textContent = '🚀 올리기';
      btn.disabled = false;
    }

    function showStatus(msg, ok) {
      const el = document.getElementById('status-msg');
      el.textContent = msg;
      el.className = `status-msg ${ok ? 'status-ok' : 'status-err'}`;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
