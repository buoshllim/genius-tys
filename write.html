<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>글 쓰기 — GENIUS TY.S.</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .write-wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: 80px 24px;
    }
    .write-wrap h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 40px;
      letter-spacing: -0.374px;
    }
    .form-group {
      margin-bottom: 24px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--ink-muted-48);
      margin-bottom: 8px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      background: var(--canvas-parchment);
      border: 1px solid var(--hairline);
      border-radius: 8px;
      padding: 12px 16px;
      font-family: var(--font);
      font-size: 17px;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--primary);
    }
    .form-group textarea {
      min-height: 320px;
      resize: vertical;
      line-height: 1.6;
    }
    .form-row {
      display: flex;
      gap: 16px;
    }
    .form-row .form-group {
      flex: 1;
    }
    .publish-btn {
      width: 100%;
      padding: 14px;
      font-size: 17px;
      font-weight: 600;
      border-radius: 12px;
      margin-top: 8px;
    }
    .status-msg {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    .status-ok { background: rgba(52,199,89,0.1); color: #1a7a32; }
    .status-err { background: rgba(255,59,48,0.1); color: #c0392b; }

    /* Setup overlay */
    .setup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .setup-box {
      background: var(--canvas);
      border-radius: 18px;
      padding: 36px;
      max-width: 440px;
      width: 100%;
    }
    .setup-box h2 {
      font-size: 21px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .setup-box p {
      font-size: 14px;
      color: var(--ink-muted-80);
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .setup-box input {
      width: 100%;
      background: var(--canvas-parchment);
      border: 1px solid var(--hairline);
      border-radius: 8px;
      padding: 12px 16px;
      font-family: var(--font);
      font-size: 14px;
      color: var(--ink);
      outline: none;
      margin-bottom: 12px;
    }
    .setup-box input:focus { border-color: var(--primary); }
  </style>
</head>
<body>

  <!-- Setup overlay (shown on first visit) -->
  <div class="setup-overlay" id="setup-overlay">
    <div class="setup-box">
      <h2>🔑 처음 설정</h2>
      <p>GitHub 토큰이랑 정보를 입력해. 한 번만 하면 돼 — 브라우저가 기억해!</p>
      <input type="password" id="setup-token" placeholder="GitHub Personal Access Token" />
      <input type="text" id="setup-owner" placeholder="GitHub 유저명 (예: buoshllim)" />
      <input type="text" id="setup-repo" placeholder="레포 이름 (예: genius-tys)" />
      <button class="btn-primary publish-btn" onclick="saveSetup()">저장하고 시작!</button>
    </div>
  </div>

  <!-- Global Nav -->
  <nav class="global-nav">
    <a class="nav-logo" href="index.html">GENIUS TY.S.</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="games.html">Games & Apps</a></li>
      <li><a href="records.html" class="active">Records & Plans</a></li>
    </ul>
    <div class="nav-right">
      <button class="lang-btn" style="color:rgba(255,255,255,0.5);font-size:11px;" onclick="clearSetup()">설정 초기화</button>
    </div>
  </nav>

  <main style="padding-top: 44px;">
    <div class="write-wrap">
      <h1>✏️ 새 글 쓰기</h1>

      <div class="form-row">
        <div class="form-group">
          <label>제목 (한국어)</label>
          <input type="text" id="title-ko" placeholder="글 제목" />
        </div>
        <div class="form-group">
          <label>제목 (영어) — 선택</label>
          <input type="text" id="title-en" placeholder="English title (optional)" />
        </div>
      </div>

      <div class="form-group">
        <label>종류</label>
        <select id="category">
          <option value="record">기록</option>
          <option value="plan">계획 & 목표</option>
        </select>
      </div>

      <div class="form-group">
        <label>내용 (마크다운 가능)</label>
        <textarea id="content" placeholder="여기에 글을 써봐!&#10;&#10;## 제목은 이렇게&#10;**굵게** *기울이기*&#10;- 목록 1&#10;- 목록 2"></textarea>
      </div>

      <button class="btn-primary publish-btn" id="publish-btn" onclick="publish()">🚀 올리기</button>

      <div class="status-msg" id="status-msg"></div>
    </div>
  </main>

  <script>
    const OWNER_KEY = 'geniustys_owner';
    const REPO_KEY = 'geniustys_repo';
    const TOKEN_KEY = 'geniustys_token';

    function checkSetup() {
      const token = localStorage.getItem(TOKEN_KEY);
      const owner = localStorage.getItem(OWNER_KEY);
      const repo = localStorage.getItem(REPO_KEY);
      if (token && owner && repo) {
        document.getElementById('setup-overlay').style.display = 'none';
      } else {
        // Pre-fill defaults
        document.getElementById('setup-owner').value = 'buoshllim';
        document.getElementById('setup-repo').value = 'genius-tys';
      }
    }

    function saveSetup() {
      const token = document.getElementById('setup-token').value.trim();
      const owner = document.getElementById('setup-owner').value.trim();
      const repo = document.getElementById('setup-repo').value.trim();
      if (!token || !owner || !repo) { alert('모두 입력해줘!'); return; }
      localStorage.setItem(TOKEN_KEY, token);
      localStorage.setItem(OWNER_KEY, owner);
      localStorage.setItem(REPO_KEY, repo);
      document.getElementById('setup-overlay').style.display = 'none';
    }

    function clearSetup() {
      if (confirm('설정을 초기화할까요?')) {
        localStorage.removeItem(TOKEN_KEY);
        localStorage.removeItem(OWNER_KEY);
        localStorage.removeItem(REPO_KEY);
        location.reload();
      }
    }

    function slugify(text) {
      return text.toLowerCase()
        .replace(/[^a-z0-9가-힣\s-]/g, '')
        .trim()
        .replace(/\s+/g, '-')
        .substring(0, 50);
    }

    function todayDate() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,'0');
      const dd = String(d.getDate()).padStart(2,'0');
      return { iso: `${y}-${m}-${dd}`, display: `${y}.${m}.${dd}` };
    }

    async function githubGet(path) {
      const token = localStorage.getItem(TOKEN_KEY);
      const owner = localStorage.getItem(OWNER_KEY);
      const repo = localStorage.getItem(REPO_KEY);
      const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
        headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' }
      });
      return res.ok ? res.json() : null;
    }

    async function githubPut(path, content, message, sha) {
      const token = localStorage.getItem(TOKEN_KEY);
      const owner = localStorage.getItem(OWNER_KEY);
      const repo = localStorage.getItem(REPO_KEY);
      const body = { message, content: btoa(unescape(encodeURIComponent(content))) };
      if (sha) body.sha = sha;
      const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
        method: 'PUT',
        headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      return res.ok;
    }

    async function publish() {
      const titleKo = document.getElementById('title-ko').value.trim();
      const titleEn = document.getElementById('title-en').value.trim();
      const category = document.getElementById('category').value;
      const content = document.getElementById('content').value.trim();

      if (!titleKo || !content) {
        showStatus('제목이랑 내용을 입력해줘!', false);
        return;
      }

      const btn = document.getElementById('publish-btn');
      btn.textContent = '올리는 중...';
      btn.disabled = true;

      const { iso, display } = todayDate();
      const slug = `${iso}-${slugify(titleKo)}`;

      try {
        // 1. Upload .ko.md
        const koOk = await githubPut(
          `posts/${slug}.ko.md`,
          content,
          `post: ${titleKo}`
        );
        if (!koOk) throw new Error('글 파일 업로드 실패');

        // 2. Upload .en.md if English title provided
        if (titleEn) {
          await githubPut(`posts/${slug}.en.md`, content, `post(en): ${titleEn}`);
        }

        // 3. Update posts/index.json
        const existing = await githubGet('posts/index.json');
        let posts = [];
        if (existing) {
          posts = JSON.parse(decodeURIComponent(escape(atob(existing.content.replace(/\n/g,'')))));
        }
        const newPost = {
          slug,
          date: display,
          title_ko: titleKo,
          title_en: titleEn || titleKo,
          category
        };
        posts.unshift(newPost);
        const indexOk = await githubPut(
          'posts/index.json',
          JSON.stringify(posts, null, 2),
          `index: add ${titleKo}`,
          existing ? existing.sha : undefined
        );
        if (!indexOk) throw new Error('목록 업데이트 실패');

        showStatus('🎉 올렸어! Vercel이 배포하는 데 1~2분 걸려.', true);
        document.getElementById('title-ko').value = '';
        document.getElementById('title-en').value = '';
        document.getElementById('content').value = '';
      } catch (e) {
        showStatus(`오류 났어: ${e.message}`, false);
      }

      btn.textContent = '🚀 올리기';
      btn.disabled = false;
    }

    function showStatus(msg, ok) {
      const el = document.getElementById('status-msg');
      el.textContent = msg;
      el.className = `status-msg ${ok ? 'status-ok' : 'status-err'}`;
      el.style.display = 'block';
    }

    checkSetup();
  </script>
</body>
</html>
