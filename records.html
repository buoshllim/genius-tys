<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Records & Plans — GENIUS TY.S.</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Floating write button */
    .fab {
      position: fixed;
      bottom: 32px;
      right: 32px;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--ink);
      color: #fff;
      border: none;
      font-size: 22px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, background 0.15s;
      z-index: 50;
    }
    .fab:hover { background: var(--primary); transform: scale(1.08); }
    .fab:active { transform: scale(0.95); }

    /* Modal overlay */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      z-index: 150;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .modal-box {
      background: var(--canvas);
      width: 100%;
      max-width: 680px;
      max-height: 92vh;
      overflow-y: auto;
      border-radius: 20px 20px 0 0;
      padding: 28px 28px 48px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
    }
    .modal-overlay.open .modal-box {
      transform: translateY(0);
    }
    .modal-handle {
      width: 36px;
      height: 4px;
      background: var(--hairline);
      border-radius: 2px;
      margin: 0 auto 24px;
    }
    .modal-title {
      font-size: 21px;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: -0.374px;
    }

    /* Form */
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--ink-muted-48); margin-bottom: 6px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; background: var(--canvas-parchment); border: 1px solid var(--hairline);
      border-radius: 8px; padding: 11px 14px; font-family: var(--font); font-size: 16px;
      color: var(--ink); outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); }
    .form-group textarea { min-height: 200px; resize: vertical; line-height: 1.6; }
    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }
    .status-msg { margin-top: 10px; padding: 10px 14px; border-radius: 8px; font-size: 13px; display: none; }
    .status-ok  { background: rgba(52,199,89,0.1);  color: #1a7a32; }
    .status-err { background: rgba(255,59,48,0.1);  color: #c0392b; }

    /* Password screen inside modal */
    .pw-screen { text-align: center; padding: 20px 0; }
    .pw-screen h3 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .pw-screen p  { font-size: 14px; color: var(--ink-muted-80); margin-bottom: 20px; }
    .pw-screen input {
      width: 100%; background: var(--canvas-parchment); border: 1px solid var(--hairline);
      border-radius: 8px; padding: 12px; font-family: var(--font); font-size: 20px;
      text-align: center; letter-spacing: 6px; outline: none; margin-bottom: 12px;
    }
    .pw-screen input:focus { border-color: var(--primary); }
    .pw-error { color: #c0392b; font-size: 13px; margin-top: 6px; display: none; }
  </style>
</head>
<body>

  <nav class="global-nav">
    <a class="nav-logo" href="index.html">GENIUS TY.S.</a>
    <ul class="nav-links">
      <li><a href="index.html" data-i18n="nav_home">Home</a></li>
      <li><a href="games.html" data-i18n="nav_games">Games & Apps</a></li>
      <li><a href="records.html" class="active" data-i18n="nav_records">Records & Plans</a></li>
    </ul>
    <div class="nav-right">
      <div class="lang-toggle">
        <button class="lang-btn" data-lang="en">ENG</button>
        <button class="lang-btn" data-lang="ko">KOR</button>
      </div>
      <button class="nav-hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <div class="mobile-menu" id="mobile-menu">
    <a href="index.html" data-i18n="nav_home">Home</a>
    <a href="games.html" data-i18n="nav_games">Games & Apps</a>
    <a href="records.html" data-i18n="nav_records">Records & Plans</a>
  </div>

  <main>
    <section class="tile tile-light">
      <h1 class="display-lg" data-i18n="records_title">Records & Plans</h1>
      <p class="body-text" style="color:var(--ink-muted-80);margin-top:12px;" data-i18n="records_sub">My thoughts, progress, and goals.</p>
      <div class="post-list" id="post-list" style="margin-top:48px;">
        <p style="color:var(--ink-muted-48);padding:40px 0;">불러오는 중...</p>
      </div>
      <div id="pagination" style="display:none;align-items:center;gap:20px;justify-content:center;margin-top:32px;">
        <button id="pg-prev" class="btn-secondary" style="padding:8px 20px;font-size:14px;" onclick="goPage(-1)">← 이전</button>
        <span id="pg-info" style="font-size:14px;color:var(--ink-muted-48);min-width:48px;text-align:center;"></span>
        <button id="pg-next" class="btn-secondary" style="padding:8px 20px;font-size:14px;" onclick="goPage(1)">다음 →</button>
      </div>
    </section>
  </main>

  <footer><p data-i18n="footer">© GENIUS TY.S. All rights reserved.</p></footer>

  <!-- Floating write button -->
  <button class="fab" id="fab" title="글 쓰기">✏️</button>

  <!-- Write modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-box">
      <div class="modal-handle"></div>

      <!-- Password screen -->
      <div id="pw-screen" class="pw-screen" style="display:none;">
        <h3>🔒 비밀번호</h3>
        <p>GENIUS TY.S.만 들어올 수 있어!</p>
        <input type="password" id="pw-input" placeholder="••••••" onkeydown="if(event.key==='Enter')checkPw()" />
        <button class="btn-primary" style="width:100%;padding:12px;" onclick="checkPw()">입장!</button>
        <p class="pw-error" id="pw-error">❌ 비밀번호가 틀렸어!</p>
      </div>

      <!-- Write form -->
      <div id="write-form" style="display:none;">
        <div class="modal-title">✏️ 새 글 쓰기</div>

        <div class="form-group">
          <label>종류</label>
          <div style="display:flex;gap:20px;padding:6px 0;">
            <label style="display:flex;align-items:center;gap:7px;cursor:pointer;white-space:nowrap;">
              <input type="radio" name="category" id="cat-record" value="record" checked />
              <span style="font-size:15px;">기록</span>
            </label>
            <label style="display:flex;align-items:center;gap:7px;cursor:pointer;white-space:nowrap;">
              <input type="radio" name="category" id="cat-plan" value="plan" />
              <span style="font-size:15px;">계획 & 목표</span>
            </label>
          </div>
        </div>

        <div class="form-group">
          <label>제목 (한국어)</label>
          <input type="text" id="title-ko" placeholder="글 제목" />
        </div>

        <div class="form-group">
          <label>내용 (한국어)</label>
          <textarea id="content-ko"></textarea>
        </div>

        <hr style="border:none;border-top:1px solid var(--hairline);margin:4px 0 18px;" />

        <div class="form-group">
          <label>제목 (영어) <span id="title-en-status" style="font-weight:400;letter-spacing:0;color:var(--primary);font-size:11px;"></span></label>
          <input type="text" id="title-en" placeholder="한국어로 작성하고 1초 멈추면 자동 번역 돼!" />
        </div>

        <div class="form-group">
          <label>내용 (영어) <span id="en-status" style="font-weight:400;letter-spacing:0;color:var(--primary);font-size:11px;"></span></label>
          <textarea id="content-en" placeholder="한국어로 작성하고 1초 멈추면 자동 번역 돼!" style="min-height:200px;"></textarea>
        </div>

        <div style="display:flex;gap:12px;">
          <button class="btn-primary" id="submit-btn" onclick="submitPost()" style="flex:1;padding:12px;border:none;cursor:pointer;">🚀 올리기</button>
          <button class="btn-secondary" onclick="closeModal()" style="padding:12px 20px;cursor:pointer;">닫기</button>
        </div>
        <div class="status-msg" id="status-msg"></div>
      </div>
    </div>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/db.js"></script>
  <script>
    const SESSION_KEY = 'geniustys_auth';
    const PW_KEY = 'geniustys_pw';

    // Post list with pagination
    const PAGE_SIZE = 10;
    let allPosts = [];
    let currentPage = 1;

    function renderPage() {
      const el = document.getElementById('post-list');
      if (!allPosts.length) {
        el.innerHTML = `<p style="color:var(--ink-muted-48);padding:40px 0;">${t('records_empty')}</p>`;
        document.getElementById('pagination').style.display = 'none';
        return;
      }
      const totalPages = Math.ceil(allPosts.length / PAGE_SIZE);
      const start = (currentPage - 1) * PAGE_SIZE;
      const page = allPosts.slice(start, start + PAGE_SIZE);

      el.innerHTML = page.map(post => {
        const title = currentLang === 'ko' ? post.title_ko : (post.title_en || post.title_ko);
        const catKey = post.category === 'record' ? 'cat_record' : 'cat_plan';
        const catClass = post.category === 'record' ? 'cat-record' : 'cat-plan';
        return `
          <a class="post-item" href="post.html?slug=${encodeURIComponent(post.slug)}">
            <span class="post-date">${post.date}</span>
            <span class="post-title">${title}</span>
            <span class="post-cat ${catClass}">${t(catKey)}</span>
          </a>`;
      }).join('');

      const pg = document.getElementById('pagination');
      if (totalPages <= 1) { pg.style.display = 'none'; return; }
      pg.style.display = 'flex';
      document.getElementById('pg-prev').disabled = currentPage === 1;
      document.getElementById('pg-next').disabled = currentPage === totalPages;
      document.getElementById('pg-info').textContent = `${currentPage} / ${totalPages}`;
    }

    async function renderPosts() {
      const el = document.getElementById('post-list');
      el.innerHTML = `<p style="color:var(--ink-muted-48);padding:40px 0;">불러오는 중...</p>`;
      allPosts = await dbFetchPosts();
      currentPage = 1;
      renderPage();
    }

    // Modal
    function openModal() {
      document.getElementById('modal-overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
      if (sessionStorage.getItem(SESSION_KEY) === '1') {
        document.getElementById('pw-screen').style.display = 'none';
        document.getElementById('write-form').style.display = 'block';
      } else {
        document.getElementById('pw-screen').style.display = 'block';
        document.getElementById('write-form').style.display = 'none';
        setTimeout(() => document.getElementById('pw-input').focus(), 300);
      }
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    // Close on overlay click (not on drag-out)
    let overlayMouseDown = false;
    const _overlay = document.getElementById('modal-overlay');
    _overlay.addEventListener('mousedown', e => { overlayMouseDown = e.target === _overlay; });
    _overlay.addEventListener('mouseup', e => {
      if (overlayMouseDown && e.target === _overlay) closeModal();
      overlayMouseDown = false;
    });

    // Password
    async function checkPw() {
      const val = document.getElementById('pw-input').value;
      const res = await fetch('/api/publish', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: val, action: 'check' })
      });
      if (res.status === 401) {
        document.getElementById('pw-error').style.display = 'block';
      } else {
        sessionStorage.setItem(SESSION_KEY, '1');
        sessionStorage.setItem(PW_KEY, val);
        document.getElementById('pw-screen').style.display = 'none';
        document.getElementById('write-form').style.display = 'block';
      }
    }

    // Auto-translate (line-by-line, markdown-safe)
    async function translateBatch(text, statusEl) {
      if (!text.trim()) return '';
      if (statusEl) statusEl.textContent = '번역 중...';
      try {
        const lines = text.split('\n');
        const entries = [];
        for (const line of lines) {
          if (!line.trim()) { entries.push(null); continue; }
          const bm = line.match(/^(#{1,6} |[-*+] |\d+\. |> )(.*)/);
          const prefix = bm ? bm[1] : '';
          const raw = bm ? bm[2] : line;
          const store = [];
          const ph = s => { store.push(s); return `{{${store.length - 1}}}`; };
          const r = raw
            .replace(/`[^`\n]+`/g, ph)
            .replace(/\*\*[^*\n]+\*\*/g, ph)
            .replace(/~~[^~\n]+~~/g, ph)
            .replace(/\*[^*\n]+\*/g, ph);
          entries.push({ prefix, r, store });
        }
        const nonNull = entries.filter(Boolean);
        if (!nonNull.length) return '';
        const batch = nonNull.map(e => e.r).join(' ||| ');
        const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(batch)}&langpair=ko|en`);
        const data = await res.json();
        if (data.responseStatus === 200) {
          const parts = data.responseData.translatedText.split(/\s*\|\|\|\s*/);
          let j = 0;
          return entries.map(e => {
            if (!e) return '';
            const translated = parts[j] !== undefined ? parts[j++] : (j++, e.r);
            return e.prefix + translated.replace(/\{\{\s*(\d+)\s*\}\}/g, (_, i) => e.store[+i] ?? '');
          }).join('\n');
        }
      } catch(e) {}
      finally { if (statusEl) statusEl.textContent = ''; }
      return '';
    }

    let titleTranslateTimer = null, contentTranslateTimer = null;
    document.getElementById('title-ko').addEventListener('input', () => {
      clearTimeout(titleTranslateTimer);
      titleTranslateTimer = setTimeout(async () => {
        const result = await translateBatch(document.getElementById('title-ko').value, document.getElementById('title-en-status'));
        if (result) document.getElementById('title-en').value = result;
      }, 1000);
    });
    document.getElementById('content-ko').addEventListener('input', () => {
      clearTimeout(contentTranslateTimer);
      contentTranslateTimer = setTimeout(async () => {
        const result = await translateBatch(document.getElementById('content-ko').value, document.getElementById('en-status'));
        document.getElementById('content-en').value = result;
      }, 1000);
    });

    // Submit
    function slugify(text) {
      return text.replace(/[^a-z0-9가-힣\s]/gi,'').trim().replace(/\s+/g,'-').toLowerCase().substring(0,50);
    }

    function today() {
      const d = new Date();
      const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
      const hh = String(d.getHours()).padStart(2,'0'), mi = String(d.getMinutes()).padStart(2,'0');
      return { iso:`${y}-${m}-${dd}`, display:`${y}.${m}.${dd} ${hh}:${mi}` };
    }

    async function submitPost() {
      const titleKo = document.getElementById('title-ko').value.trim();
      const titleEn = document.getElementById('title-en').value.trim();
      const category = document.querySelector('input[name="category"]:checked').value;
      const contentKo = document.getElementById('content-ko').value.trim();
      const contentEn = document.getElementById('content-en').value.trim();
      const pw = sessionStorage.getItem(PW_KEY);

      if (!titleKo || !contentKo) { showStatus('제목이랑 내용을 입력해줘!', false); return; }

      const btn = document.getElementById('submit-btn');
      btn.textContent = '저장 중...'; btn.disabled = true;

      const { iso, display } = today();
      const slug = `${iso}-${slugify(titleKo)}`;

      const res = await fetch('/api/publish', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw, action: 'create', slug, title_ko: titleKo, title_en: titleEn, category, content_ko: contentKo, content_en: contentEn, date: display })
      });

      const data = await res.json();
      if (!res.ok) { showStatus(`오류: ${data.error}`, false); }
      else {
        showStatus('🎉 올렸어!', true);
        document.getElementById('title-ko').value = '';
        document.getElementById('title-en').value = '';
        document.getElementById('content-ko').value = '';
        document.getElementById('content-en').value = '';
        renderPosts();
        setTimeout(closeModal, 1500);
      }

      btn.textContent = '🚀 올리기'; btn.disabled = false;
    }

    function showStatus(msg, ok) {
      const el = document.getElementById('status-msg');
      el.textContent = msg; el.className = `status-msg ${ok ? 'status-ok' : 'status-err'}`;
      el.style.display = 'block';
    }

    // Markdown placeholder
    document.getElementById('content-ko').placeholder = "여기에 내용을 작성해!\n마크다운 언어도 가능해.\n\n# 큰 제목\n## 작은 제목\n### 더 작은 제목\n\n**굵게**\n*기울이기*\n\n- 목록1\n- 목록2\n\n1. 순서 있는 목록1\n2. 순서 있는 목록2";

    // FAB
    document.getElementById('fab').addEventListener('click', openModal);

    function goPage(dir) {
      const totalPages = Math.ceil(allPosts.length / PAGE_SIZE);
      currentPage = Math.max(1, Math.min(totalPages, currentPage + dir));
      renderPage();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function onLangChange() { renderPage(); }
    initLang();
    renderPosts();

    document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('mobile-menu').classList.toggle('open');
    });
  </script>
</body>
</html>
